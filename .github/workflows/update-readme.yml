name: Update README Activity

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update profile README with recent GitHub activity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate recent activity
        env:
          GH_USERNAME: Maqoba-Jiyane
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.request

          username = os.environ["GH_USERNAME"]
          token = os.environ["GITHUB_TOKEN"]

          request = urllib.request.Request(
              f"https://api.github.com/users/{username}/events/public?per_page=30",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "profile-readme-activity-updater",
              },
          )

          with urllib.request.urlopen(request) as response:
              events = json.loads(response.read().decode("utf-8"))

          lines = []

          for event in events:
              event_type = event.get("type")
              repo = event.get("repo", {}).get("name", "unknown repository")
              payload = event.get("payload", {})

              if event_type == "PushEvent":
                  commits = payload.get("commits", [])
                  if commits:
                      latest_commit = commits[-1]
                      message = latest_commit.get("message", "Updated code").splitlines()[0]
                      sha = latest_commit.get("sha", "")[:7]
                      lines.append(f"- Pushed `{sha}` to **{repo}** — {message}")
                  else:
                      lines.append(f"- Pushed updates to **{repo}**")

              elif event_type == "PullRequestEvent":
                  action = payload.get("action", "updated").capitalize()
                  pr = payload.get("pull_request", {})
                  number = pr.get("number", "")
                  title = pr.get("title", "pull request")
                  lines.append(f"- {action} PR #{number} in **{repo}** — {title}")

              elif event_type == "IssuesEvent":
                  action = payload.get("action", "updated").capitalize()
                  issue = payload.get("issue", {})
                  number = issue.get("number", "")
                  title = issue.get("title", "issue")
                  lines.append(f"- {action} issue #{number} in **{repo}** — {title}")

              elif event_type == "IssueCommentEvent":
                  issue = payload.get("issue", {})
                  number = issue.get("number", "")
                  lines.append(f"- Commented on issue/PR #{number} in **{repo}**")

              elif event_type == "CreateEvent":
                  ref_type = payload.get("ref_type", "repository")
                  lines.append(f"- Created {ref_type} in **{repo}**")

              elif event_type == "ReleaseEvent":
                  action = payload.get("action", "published").capitalize()
                  release = payload.get("release", {})
                  name = release.get("name") or release.get("tag_name") or "release"
                  lines.append(f"- {action} release in **{repo}** — {name}")

              if len(lines) >= 5:
                  break

          if not lines:
              lines = ["- No recent public GitHub activity found."]

          readme_path = "README.md"

          with open(readme_path, "r", encoding="utf-8") as file:
              readme = file.read()

          start = "<!--START_SECTION:activity-->"
          end = "<!--END_SECTION:activity-->"

          pattern = f"{re.escape(start)}[\\s\\S]*?{re.escape(end)}"
          replacement = start + "\n" + "\n".join(lines) + "\n" + end

          updated_readme = re.sub(pattern, replacement, readme)

          if updated_readme == readme:
              print("No README changes found.")
          else:
              with open(readme_path, "w", encoding="utf-8") as file:
                  file.write(updated_readme)
              print("README activity section updated.")
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "⚡ Update README with recent GitHub activity"
            git push
          fi
